<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSA Practical Codes | Prathamesh Kinagi</title>
    <meta name="description" content="A comprehensive collection of Advanced Data Structures and Algorithms practice codes, featuring time complexities and structured implementations.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- PrismJS CSS for Syntax Highlighting (Okaidia Theme) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <header class="hero">
        <div class="container">
            <h1 class="gradient-text">ADSA Practice Codes</h1>
            <p class="subtitle">A curated collection of my Advanced Data Structures and Algorithms assignments</p>
        </div>
    </header>

    <section class="container" id="time-complexities-section">
        <div class="code-card" style="margin-bottom: 3rem;">
            <div class="card-header" style="justify-content: center; margin-bottom: 2rem;">
                <h2 class="card-title">Algorithm Complexities Overview</h2>
            </div>
            <div class="table-responsive">
                <table class="complexity-table">
                    <thead>
                        <tr>
                            <th>Assignment Title</th>
                            <th>Time & Space Complexity</th>
                        </tr>
                    </thead>
                    <tbody id="complexity-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Assignments</button>
            <button class="filter-btn" data-filter="Assignment1">Assignment 1</button>
            <button class="filter-btn" data-filter="Assignment2">Assignment 2</button>
            <button class="filter-btn" data-filter="Assignment3">Assignment 3</button>
            <button class="filter-btn" data-filter="Assignment4">Assignment 4</button>
            <button class="filter-btn" data-filter="Assignment5">Assignment 5</button>
            <button class="filter-btn" data-filter="Assignment6">Assignment 6</button>
            <button class="filter-btn" data-filter="Assignment7">Assignment 7</button>
        </div>

        <div class="codes-grid" id="codes-container">
            <!-- Cards will be injected here via JavaScript -->
        </div>
    </main>

    <footer>
        <p>Built with ❤️ by Prathamesh Kinagi</p>
    </footer>

    <!-- PrismJS and Data Source -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
